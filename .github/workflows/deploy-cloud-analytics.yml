name: Deploy Cloud Analytics

on:
  push:
    branches:
      - main
    paths:
      - "cloud-analytics/**"
      - ".github/workflows/deploy-cloud-analytics.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloud-analytics
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          if [[ -z "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "Missing required secret: GCP_SA_KEY" >&2
            exit 1
          fi
          if [[ -z "${{ secrets.RANDA_ADMIN_TOKEN }}" ]]; then
            echo "Missing required secret: RANDA_ADMIN_TOKEN" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          gcloud run deploy randaworks-analytics \
            --source ./cloud-analytics \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --set-env-vars GCS_BUCKET=randaworks-analytics-events,RANDA_ADMIN_TOKEN=${{ secrets.RANDA_ADMIN_TOKEN }}
